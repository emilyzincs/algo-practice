name: Project CI
on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build step (nothing to do)"
  
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: python test.py
      - name: Cleanup generated test files
        if: always()
        run: find . -type f -path "*/problems/*/test.json" -delete
