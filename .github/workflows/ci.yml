name: Project CI
on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build step (nothing to do)"
  
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install package
        run: pip install -e .
      - run: echo "Running tests"
      - run: ./test.sh all
